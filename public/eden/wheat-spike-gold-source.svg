<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 540" width="240" height="540">
  <title>Wheat spike source — gold (EDEN)</title>
  <!-- Transparent background; keep colors saturated so EDEN's saturation-key doesn't erase the spike. -->
  <defs>
    <linearGradient id="wheatGoldStem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F6D070"/>
      <stop offset="0.55" stop-color="#E8B74A"/>
      <stop offset="1" stop-color="#C98218"/>
    </linearGradient>
    <linearGradient id="wheatGoldAwn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF0B6" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#E8B74A" stop-opacity="0.15"/>
    </linearGradient>
    <radialGradient id="wheatGoldGlow" cx="30%" cy="10%" r="80%">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="0.35" stop-color="#FFE8A8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#E8B74A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Stem (slightly curved) -->
  <path
    d="M126 510
       C132 410 127 330 120 250
       C112 160 108 92 118 28"
    fill="none"
    stroke="url(#wheatGoldStem)"
    stroke-width="10"
    stroke-linecap="round"
    opacity="0.9"/>

  <!-- Spike body: stylized grains (ellipses) along axis -->
  <g opacity="0.98">
    <ellipse cx="120" cy="110" rx="22" ry="16" fill="url(#wheatGoldStem)"/>
    <ellipse cx="106" cy="132" rx="20" ry="15" fill="url(#wheatGoldStem)"/>
    <ellipse cx="134" cy="132" rx="20" ry="15" fill="url(#wheatGoldStem)"/>

    <ellipse cx="118" cy="158" rx="22" ry="16" fill="url(#wheatGoldStem)"/>
    <ellipse cx="102" cy="182" rx="20" ry="15" fill="url(#wheatGoldStem)"/>
    <ellipse cx="138" cy="182" rx="20" ry="15" fill="url(#wheatGoldStem)"/>

    <ellipse cx="120" cy="210" rx="23" ry="16" fill="url(#wheatGoldStem)"/>
    <ellipse cx="104" cy="236" rx="21" ry="15" fill="url(#wheatGoldStem)"/>
    <ellipse cx="136" cy="236" rx="21" ry="15" fill="url(#wheatGoldStem)"/>

    <ellipse cx="120" cy="266" rx="23" ry="16" fill="url(#wheatGoldStem)"/>
    <ellipse cx="106" cy="294" rx="21" ry="15" fill="url(#wheatGoldStem)"/>
    <ellipse cx="134" cy="294" rx="21" ry="15" fill="url(#wheatGoldStem)"/>

    <ellipse cx="120" cy="324" rx="22" ry="15" fill="url(#wheatGoldStem)"/>
    <ellipse cx="108" cy="352" rx="20" ry="14" fill="url(#wheatGoldStem)"/>
    <ellipse cx="132" cy="352" rx="20" ry="14" fill="url(#wheatGoldStem)"/>

    <ellipse cx="120" cy="384" rx="20" ry="14" fill="url(#wheatGoldStem)"/>
  </g>

  <!-- Awns (fine lines, but not too thin) -->
  <g stroke="url(#wheatGoldAwn)" stroke-width="4" stroke-linecap="round" opacity="0.75">
    <path d="M104 104 C84 96 70 80 56 66"/>
    <path d="M136 104 C156 96 170 80 184 66"/>

    <path d="M88 154 C70 144 58 128 46 114"/>
    <path d="M152 154 C170 144 182 128 194 114"/>

    <path d="M86 224 C70 214 60 198 50 182"/>
    <path d="M154 224 C170 214 180 198 190 182"/>

    <path d="M92 304 C78 292 68 276 60 260"/>
    <path d="M148 304 C162 292 172 276 180 260"/>

    <path d="M102 388 C92 374 84 356 78 338"/>
    <path d="M138 388 C148 374 156 356 162 338"/>
  </g>

  <!-- Soft highlight to keep "sun" feel -->
  <path
    d="M150 92
       C164 160 160 260 144 350
       C134 404 126 448 116 506"
    fill="none"
    stroke="url(#wheatGoldGlow)"
    stroke-width="18"
    stroke-linecap="round"
    opacity="0.55"/>
</svg>
